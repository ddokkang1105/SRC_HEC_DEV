	<body class="yui-skin-sam">
	   <div id="container"><h2 class="first">RathonSSO Service Provider Agent Configurations</h2></div> 
	   
	   <script type="text/javascript">
	        var tabView = null;
	        
		   (function(){
			   tabView = new YAHOO.widget.TabView({orientation:'top'});
			   
			   tabView.addTab( new YAHOO.widget.Tab({
	               label: 'Basic Configurations',
	               dataSrc: 'basic.html',
	               cacheData: false,
	               active: true
	           }));
	           
			   tabView.addTab( new YAHOO.widget.Tab({
	               label: 'Configurations for SP',
	               dataSrc: 'sp.html',
	               cacheData: false,
	               active: false
	           }));
			   
			   tabView.addTab( new YAHOO.widget.Tab({
			        label: 'Configurations for IdP',
			        dataSrc: 'idp.html',
			        cacheData: false,
			        active: false
			    }));
			   
			   tabView.appendTo('container');
			   
			   tabView.on('activeIndexChange', function(_e) {
	               rathon.doStart(_e.newValue);
	           });
			   
			   rathon.doStart(0);
		   })();
	   </script>
	</body>
